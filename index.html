<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xu QIAN | Personal Dashboard</title>
    
    <!-- React & ReactDOM via CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX compilation in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.08);
        }

        .gradient-text {
            background: linear-gradient(135deg, #4f46e5, #9333ea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .bg-mesh {
            background-color: #f8fafc;
            background-image: 
                radial-gradient(at 40% 20%, hsla(250,100%,90%,1) 0px, transparent 50%),
                radial-gradient(at 80% 0%, hsla(189,100%,90%,1) 0px, transparent 50%),
                radial-gradient(at 0% 50%, hsla(355,100%,93%,1) 0px, transparent 50%),
                radial-gradient(at 80% 50%, hsla(340,100%,90%,1) 0px, transparent 50%),
                radial-gradient(at 0% 100%, hsla(22,100%,90%,1) 0px, transparent 50%),
                radial-gradient(at 80% 100%, hsla(242,100%,90%,1) 0px, transparent 50%),
                radial-gradient(at 0% 0%, hsla(343,100%,90%,1) 0px, transparent 50%);
        }

        .input-field {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid #e2e8f0;
            background-color: #f8fafc;
            transition: all 0.2s;
        }
        .input-field:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
            background-color: #ffffff;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 500;
            transition: all 0.2s;
            box-shadow: 0 4px 14px 0 rgba(99, 102, 241, 0.39);
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }
        .btn-primary:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body class="bg-mesh min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const AuthPage = ({ onLogin }) => {
            const [isLogin, setIsLogin] = useState(true);
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                setError('');
                if (!username || !password) { setError('Please fill in all fields'); return; }
                const users = JSON.parse(localStorage.getItem('users') || '{}');
                if (isLogin) {
                    if (users[username] && users[username].password === password) {
                        localStorage.setItem('currentUser', username);
                        onLogin(username);
                    } else { setError('Invalid username or password'); }
                } else {
                    if (users[username]) { setError('Username already exists'); }
                    else {
                        users[username] = { password, profile: { name: username, role: 'User', bio: 'Hello, I am using Tanka Dashboard.' }, notes: [] };
                        localStorage.setItem('users', JSON.stringify(users));
                        localStorage.setItem('currentUser', username);
                        onLogin(username);
                    }
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="glass-card w-full max-w-md p-8 rounded-2xl">
                        <div className="text-center mb-8">
                            <div className="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-sm">
                                <i data-lucide="hexagon" className="w-8 h-8"></i>
                            </div>
                            <h1 className="text-2xl font-bold text-slate-800">{isLogin ? 'Welcome Back' : 'Create Account'}</h1>
                            <p className="text-slate-500 mt-2">{isLogin ? 'Enter your details to access your dashboard' : 'Sign up to start managing your notes'}</p>
                        </div>
                        {error && (
                            <div className="bg-red-50 text-red-600 p-3 rounded-lg text-sm mb-6 flex items-center gap-2 border border-red-100">
                                <i data-lucide="alert-circle" className="w-4 h-4"></i>{error}
                            </div>
                        )}
                        <form onSubmit={handleSubmit} className="space-y-5">
                            <div>
                                <label className="block text-sm font-medium text-slate-700 mb-1">Username</label>
                                <input type="text" className="input-field" placeholder="Enter your username" value={username} onChange={(e) => setUsername(e.target.value)} />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-slate-700 mb-1">Password</label>
                                <input type="password" className="input-field" placeholder="\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022" value={password} onChange={(e) => setPassword(e.target.value)} />
                            </div>
                            <button type="submit" className="btn-primary w-full mt-2">{isLogin ? 'Sign In' : 'Sign Up'}</button>
                        </form>
                        <div className="mt-6 text-center text-sm text-slate-500">
                            {isLogin ? "Don't have an account? " : "Already have an account? "}
                            <button onClick={() => { setIsLogin(!isLogin); setError(''); }} className="text-indigo-600 font-medium hover:underline">
                                {isLogin ? 'Sign up' : 'Sign in'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const Dashboard = ({ username, onLogout }) => {
            const [activeTab, setActiveTab] = useState('notes');
            const [userData, setUserData] = useState(null);

            useEffect(() => {
                const users = JSON.parse(localStorage.getItem('users') || '{}');
                setUserData(users[username]);
            }, [username]);

            const saveUserData = (newData) => {
                const users = JSON.parse(localStorage.getItem('users') || '{}');
                users[username] = newData;
                localStorage.setItem('users', JSON.stringify(users));
                setUserData(newData);
            };

            if (!userData) return null;

            return (
                <div className="min-h-screen flex flex-col">
                    <nav className="glass-card sticky top-0 z-50 border-b-0 rounded-none">
                        <div className="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-2 font-bold text-xl tracking-tight text-slate-800">
                                <div className="w-8 h-8 bg-indigo-600 text-white rounded-lg flex items-center justify-center">
                                    <i data-lucide="hexagon" className="w-5 h-5"></i>
                                </div>
                                <span>Dashboard</span>
                            </div>
                            <div className="flex items-center gap-4">
                                <span className="text-sm font-medium text-slate-600 hidden sm:block">Hi, {userData.profile.name}</span>
                                <button onClick={onLogout} className="text-slate-500 hover:text-red-600 transition-colors p-2 rounded-lg hover:bg-red-50 flex items-center gap-2 text-sm font-medium">
                                    <i data-lucide="log-out" className="w-4 h-4"></i>
                                    <span className="hidden sm:block">Logout</span>
                                </button>
                            </div>
                        </div>
                    </nav>
                    <main className="flex-grow max-w-6xl mx-auto w-full px-6 py-8 flex flex-col md:flex-row gap-8">
                        <aside className="w-full md:w-64 shrink-0">
                            <div className="glass-card rounded-2xl p-4 flex flex-col gap-2">
                                <button onClick={() => setActiveTab('notes')} className={`flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all ${activeTab === 'notes' ? 'bg-indigo-50 text-indigo-700' : 'text-slate-600 hover:bg-slate-50'}`}>
                                    <i data-lucide="book-open" className="w-5 h-5"></i>My Notes
                                </button>
                                <button onClick={() => setActiveTab('profile')} className={`flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all ${activeTab === 'profile' ? 'bg-indigo-50 text-indigo-700' : 'text-slate-600 hover:bg-slate-50'}`}>
                                    <i data-lucide="user" className="w-5 h-5"></i>Profile Info
                                </button>
                            </div>
                        </aside>
                        <div className="flex-grow">
                            {activeTab === 'notes' ? <NotesView userData={userData} saveUserData={saveUserData} /> : <ProfileView userData={userData} saveUserData={saveUserData} />}
                        </div>
                    </main>
                    <footer className="py-6 text-center text-slate-500 text-sm">
                        <p>\u00a9 {new Date().getFullYear()} Xu QIAN. All rights reserved.</p>
                        <p className="text-xs mt-1 text-slate-400">Built with Tanka</p>
                    </footer>
                </div>
            );
        };

        const NotesView = ({ userData, saveUserData }) => {
            const [notes, setNotes] = useState(userData.notes || []);
            const [newNote, setNewNote] = useState('');

            const addNote = (e) => {
                e.preventDefault();
                if (!newNote.trim()) return;
                const updatedNotes = [{ id: Date.now().toString(), content: newNote, date: new Date().toLocaleDateString() }, ...notes];
                setNotes(updatedNotes);
                saveUserData({ ...userData, notes: updatedNotes });
                setNewNote('');
            };

            const deleteNote = (id) => {
                const updatedNotes = notes.filter(n => n.id !== id);
                setNotes(updatedNotes);
                saveUserData({ ...userData, notes: updatedNotes });
            };

            return (
                <div className="space-y-6">
                    <div className="glass-card rounded-2xl p-6">
                        <h2 className="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2">
                            <i data-lucide="pen-tool" className="w-5 h-5 text-indigo-500"></i>Create Note
                        </h2>
                        <form onSubmit={addNote} className="flex gap-3">
                            <input type="text" className="input-field flex-grow" placeholder="What's on your mind?" value={newNote} onChange={(e) => setNewNote(e.target.value)} />
                            <button type="submit" className="btn-primary whitespace-nowrap flex items-center gap-2">
                                <i data-lucide="plus" className="w-4 h-4"></i>Add
                            </button>
                        </form>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {notes.length === 0 ? (
                            <div className="col-span-full text-center py-12 text-slate-400 glass-card rounded-2xl border-dashed">
                                <i data-lucide="inbox" className="w-12 h-12 mx-auto mb-3 opacity-50"></i>
                                <p>No notes yet. Create one above!</p>
                            </div>
                        ) : (
                            notes.map(note => (
                                <div key={note.id} className="glass-card rounded-2xl p-5 group hover:shadow-lg transition-all">
                                    <div className="flex justify-between items-start mb-3">
                                        <span className="text-xs font-medium text-indigo-500 bg-indigo-50 px-2 py-1 rounded-md">{note.date}</span>
                                        <button onClick={() => deleteNote(note.id)} className="text-slate-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity">
                                            <i data-lucide="trash-2" className="w-4 h-4"></i>
                                        </button>
                                    </div>
                                    <p className="text-slate-700 leading-relaxed">{note.content}</p>
                                </div>
                            ))
                        )}
                    </div>
                </div>
            );
        };

        const ProfileView = ({ userData, saveUserData }) => {
            const [profile, setProfile] = useState(userData.profile);
            const [isEditing, setIsEditing] = useState(false);
            const [savedMsg, setSavedMsg] = useState(false);

            const handleSave = (e) => {
                e.preventDefault();
                saveUserData({ ...userData, profile });
                setIsEditing(false);
                setSavedMsg(true);
                setTimeout(() => setSavedMsg(false), 3000);
            };

            return (
                <div className="glass-card rounded-2xl p-8 max-w-2xl">
                    <div className="flex justify-between items-center mb-8">
                        <h2 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
                            <i data-lucide="user-circle" className="w-6 h-6 text-indigo-500"></i>Personal Information
                        </h2>
                        {!isEditing && (
                            <button onClick={() => setIsEditing(true)} className="text-sm font-medium text-indigo-600 hover:text-indigo-700 flex items-center gap-1 bg-indigo-50 px-3 py-1.5 rounded-lg">
                                <i data-lucide="edit-2" className="w-4 h-4"></i>Edit
                            </button>
                        )}
                    </div>
                    {savedMsg && (
                        <div className="bg-green-50 text-green-600 p-3 rounded-lg text-sm mb-6 flex items-center gap-2 border border-green-100">
                            <i data-lucide="check-circle" className="w-4 h-4"></i>Profile updated successfully!
                        </div>
                    )}
                    {isEditing ? (
                        <form onSubmit={handleSave} className="space-y-5">
                            <div>
                                <label className="block text-sm font-medium text-slate-700 mb-1">Display Name</label>
                                <input type="text" className="input-field" value={profile.name} onChange={(e) => setProfile({...profile, name: e.target.value})} required />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-slate-700 mb-1">Role / Title</label>
                                <input type="text" className="input-field" value={profile.role} onChange={(e) => setProfile({...profile, role: e.target.value})} />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-slate-700 mb-1">Bio</label>
                                <textarea className="input-field min-h-[100px] resize-y" value={profile.bio} onChange={(e) => setProfile({...profile, bio: e.target.value})}></textarea>
                            </div>
                            <div className="flex gap-3 pt-2">
                                <button type="submit" className="btn-primary">Save Changes</button>
                                <button type="button" onClick={() => { setProfile(userData.profile); setIsEditing(false); }} className="px-6 py-2 rounded-lg font-medium text-slate-600 hover:bg-slate-100 transition-colors">Cancel</button>
                            </div>
                        </form>
                    ) : (
                        <div className="space-y-6">
                            <div className="flex items-center gap-6">
                                <div className="w-24 h-24 rounded-full bg-gradient-to-br from-indigo-400 to-purple-500 flex items-center justify-center text-white text-3xl font-bold shadow-lg">
                                    {profile.name.charAt(0).toUpperCase()}
                                </div>
                                <div>
                                    <h3 className="text-2xl font-bold text-slate-800">{profile.name}</h3>
                                    <p className="text-indigo-600 font-medium">{profile.role}</p>
                                </div>
                            </div>
                            <div className="pt-6 border-t border-slate-100">
                                <h4 className="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3">About Me</h4>
                                <p className="text-slate-700 leading-relaxed whitespace-pre-wrap">{profile.bio || "No bio provided yet."}</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [currentUser, setCurrentUser] = useState(null);

            useEffect(() => { lucide.createIcons(); });

            useEffect(() => {
                const savedUser = localStorage.getItem('currentUser');
                if (savedUser) setCurrentUser(savedUser);
            }, []);

            const handleLogout = () => {
                localStorage.removeItem('currentUser');
                setCurrentUser(null);
            };

            return (
                <div>
                    {currentUser ? <Dashboard username={currentUser} onLogout={handleLogout} /> : <AuthPage onLogin={setCurrentUser} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
