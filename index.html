<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xu QIAN | Personal Portfolio</title>
    
    <!-- React & ReactDOM via CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX compilation in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

        .animate-float { animation: float 6s ease-in-out infinite; }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .gradient-text {
            background: linear-gradient(to right, #38bdf8, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .bg-grid {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(255,255,255,0.05) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255,255,255,0.05) 1px, transparent 1px);
            mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
        }

        #particles-canvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="particles-canvas"></canvas>
    <div id="root"></div>

    <script>
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * 1 - 0.5;
                this.color = `rgba(${Math.floor(Math.random()*100+155)},${Math.floor(Math.random()*100+155)},255,${Math.random()*0.3})`;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        function initParticles() { particles = []; for (let i=0;i<100;i++) particles.push(new Particle()); }
        function animateParticles() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            for (let i=0;i<particles.length;i++) {
                particles[i].update(); particles[i].draw();
                for (let j=i;j<particles.length;j++) {
                    const dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y;
                    const dist=Math.sqrt(dx*dx+dy*dy);
                    if (dist<100) {
                        ctx.beginPath();
                        ctx.strokeStyle=`rgba(100,150,255,${0.1-dist/1000})`;
                        ctx.lineWidth=0.5;
                        ctx.moveTo(particles[i].x,particles[i].y);
                        ctx.lineTo(particles[j].x,particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animateParticles);
        }
        initParticles(); animateParticles();
    </script>

    <script type="text/babel">

        const Navbar = () => {
            const [scrolled, setScrolled] = useState(false);

            }, []);
            return (
                <nav className={`fixed w-full z-50 transition-all duration-300 ${scrolled ? 'glass-panel py-4' : 'bg-transparent py-6'}`}>

                            <a href="#showcase" className="hover:text-white transition-colors">Showcase</a>

                    <div className="flex-1 text-center md:text-left">

                            Welcome to my digital space
                        </div>
                        <h1 className="text-5xl md:text-7xl font-bold tracking-tight mb-6 leading-tight">
                            Hello, I'm <br/><span className="gradient-text">Xu QIAN</span>
                        </h1>
                        <p className="text-lg md:text-xl text-slate-400 mb-10 max-w-xl mx-auto md:mx-0 leading-relaxed">
                            Exploring the intersection of design, technology, and human experience. Building elegant solutions for complex problems.

                        <div className="flex flex-col sm:flex-row gap-4 justify-center md:justify-start">
                            <a href="#showcase" className="px-8 py-4 rounded-lg bg-white text-slate-900 font-semibold hover:bg-slate-200 transition-colors flex items-center justify-center gap-2">

                                Get in Touch
                            </a>

                    </div>
                    <div className="flex-1 hidden md:flex justify-center animate-float">
                        <div className="relative w-80 h-80">
                            <div className="absolute inset-0 rounded-full border border-slate-700/50"></div>
                            <div className="absolute inset-4 rounded-full border border-slate-600/50 border-dashed animate-[spin_20s_linear_infinite]"></div>

                                <i data-lucide="cpu"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        );

        const FeatureCard = ({ icon, title, desc }) => (
            <div className="glass-panel p-8 rounded-2xl hover:-translate-y-2 transition-transform duration-300 group">

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8">

                    </div>
                    <div className="mt-24 glass-panel rounded-3xl p-8 md:p-12 overflow-hidden relative">
                        <div className="absolute top-0 right-0 w-64 h-64 bg-purple-500/10 rounded-full blur-3xl"></div>
                        <div className="relative z-10 flex flex-col md:flex-row items-center justify-between gap-8">
                            <div>

                                <p className="text-slate-400 max-w-md">Let's turn your ideas into reality. I'm always open to discussing new projects and creative opportunities.</p>
                            </div>
                            <a href="#contact" className="px-8 py-4 rounded-full bg-gradient-to-r from-sky-500 to-purple-500 text-white font-semibold hover:shadow-[0_0_20px_rgba(168,85,247,0.4)] transition-all whitespace-nowrap">
                                Start a Conversation
                            </a>
                        </div>
                    </div>
                </div>
            </section>
        );

        const Footer = () => (
            <footer id="contact" className="border-t border-slate-800 py-12 mt-20">
                <div className="max-w-6xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-6">
                    <div className="text-2xl font-bold tracking-tighter">
                        <span className="text-white">XU</span><span className="text-sky-400">.QIAN</span>
                    </div>
                    <div className="flex gap-6">
                        <a href="#" className="w-10 h-10 rounded-full glass-panel flex items-center justify-center text-slate-400 hover:text-white hover:bg-slate-800 transition-all">
                            <i data-lucide="github" className="w-5 h-5"></i>
                        </a>
                        <a href="#" className="w-10 h-10 rounded-full glass-panel flex items-center justify-center text-slate-400 hover:text-white hover:bg-slate-800 transition-all">
                            <i data-lucide="twitter" className="w-5 h-5"></i>

                        <a href="#" className="w-10 h-10 rounded-full glass-panel flex items-center justify-center text-slate-400 hover:text-white hover:bg-slate-800 transition-all">
                            <i data-lucide="mail" className="w-5 h-5"></i>

                    </div>
                    <div className="text-center">
                        <p className="text-slate-500 text-sm">© {new Date().getFullYear()} Xu QIAN. All rights reserved.</p>

        );

        const App = () => {

            return (

                    <Navbar />

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
